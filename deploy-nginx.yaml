apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-nginx
  namespace: kiran
  annotations:
    kubernetes.io/change-cause: "canary deployment for nginx"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: c1
        image: nginxdemos/hello
      - name: c2
        image: nginx
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: nginx-c2-config
          mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-c2-config
          configMap:
            name: nginx-c2-config
